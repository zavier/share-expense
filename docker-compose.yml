services:
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      # 对应 application.properties 中的 ${MYSQL_PWD}
      MYSQL_PWD: secret123
      # 覆盖 spring.datasource.url，用 Compose 服务名 db 代替 localhost
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/share_expense
      SPRING_DATASOURCE_USERNAME: root
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret123       # 和 MYSQL_PWD 保持一致
      MYSQL_DATABASE: share_expense        # 容器启动时自动创建数据库
    volumes:
      - mysql-data:/var/lib/mysql          # 数据持久化
      # 首次启动时自动执行建表脚本
      - ./share-expense-infrastructure/src/main/resources/expense.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql-data:
